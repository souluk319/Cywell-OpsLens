apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: cywell-opslens-operator.v0.1.0
  namespace: placeholder
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "opslens.cywell.io/v1alpha1",
          "kind": "OpsLensInstallation",
          "metadata": {
            "name": "cywell-opslens",
            "namespace": "cywell-opslens"
          },
          "spec": {
            "version": "0.1.0",
            "targetNamespace": "cywell-opslens",
            "components": {
              "api": {
                "image": "quay.io/cywell/opslens-api:0.1.0",
                "replicas": 2,
                "serviceName": "cywell-opslens-api"
              },
              "dashboard": {
                "image": "quay.io/cywell/opslens-dashboard:0.1.0",
                "replicas": 1,
                "serviceName": "cywell-opslens-dashboard"
              },
              "vectorStore": {
                "provider": "qdrant",
                "image": "docker.io/qdrant/qdrant:v1.12.1",
                "storageSize": "20Gi"
              },
              "modelRuntime": {
                "provider": "vllm",
                "image": "quay.io/cywell/opslens-vllm:0.1.0",
                "model": "gemma-4-opslens",
                "replicas": 1,
                "gpu": {
                  "enabled": true,
                  "deviceClass": "nvidia.com/gpu",
                  "count": 1
                }
              }
            },
            "rag": {
              "documentIntake": {
                "mode": "ValidateOnly",
                "evidenceExport": true,
                "rawDocumentReturnAllowed": false
              },
              "approvalQueue": {
                "mode": "DesignOnly",
                "enqueueAllowed": false,
                "requiredApprovals": [
                  "rag-owner",
                  "cluster-sre"
                ]
              }
            },
            "lightspeedRegistration": {
              "mode": "PatchOLSConfig",
              "olsConfigName": "cluster",
              "olsConfigNamespace": "openshift-lightspeed",
              "mcpServerName": "cywell-opslens",
              "apiKeySecretName": "cywell-opslens-mcp-header",
              "userTokenForwarding": true,
              "endpoint": "https://cywell-opslens-api.cywell-opslens.svc.cluster.local/mcp"
            },
            "consolePlugin": {
              "enabled": true,
              "name": "cywell-opslens"
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: OpenShift Optional, Monitoring, AI/Machine Learning
    certified: "false"
    containerImage: quay.io/cywell/opslens-operator:0.1.0
    createdAt: "2026-06-12T00:00:00Z"
    description: Dashboard-first OpenShift operations AI with Lightspeed MCP integration, private RAG, and evidence-first incident analysis.
    support: Cywell
    repository: https://github.com/souluk319/Cywell-OpsLens
    com.redhat.openshift.versions: v4.16-v4.19
    operators.openshift.io/valid-subscription: Contact Cywell
    features.operators.openshift.io/disconnected: "true"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "true"
    features.operators.openshift.io/tls-profiles: "true"
    operators.operatorframework.io/builder: operator-sdk-v1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
spec:
  displayName: Cywell OpsLens
  description: Cywell OpsLens installs a read-only OpenShift operations AI service, private vector store, admin dashboard, ConsolePlugin, and explicit OpenShift Lightspeed MCP registration path.
  maturity: alpha
  version: 0.1.0
  minKubeVersion: 1.28.0
  provider:
    name: Cywell
  maintainers:
    - name: Cywell OpsLens Team
      email: opslens-support@cywell.com
  keywords:
    - openshift
    - lightspeed
    - aiops
    - rag
    - observability
  links:
    - name: Cywell OpsLens
      url: https://github.com/souluk319/Cywell-OpsLens
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  customresourcedefinitions:
    owned:
      - name: opslensinstallations.opslens.cywell.io
        version: v1alpha1
        kind: OpsLensInstallation
        displayName: OpsLens Installation
        description: Declares the Cywell OpsLens API, dashboard, vector store, model runtime, ConsolePlugin, and Lightspeed MCP registration mode.
  relatedImages:
    - name: operator
      image: quay.io/cywell/opslens-operator:0.1.0
    - name: api
      image: quay.io/cywell/opslens-api:0.1.0
    - name: dashboard
      image: quay.io/cywell/opslens-dashboard:0.1.0
    - name: vllm
      image: quay.io/cywell/opslens-vllm:0.1.0
    - name: qdrant
      image: docker.io/qdrant/qdrant:v1.12.1
  install:
    strategy: deployment
    spec:
      clusterPermissions:
        - serviceAccountName: cywell-opslens-operator
          rules:
            - apiGroups:
                - opslens.cywell.io
              resources:
                - opslensinstallations
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - opslens.cywell.io
              resources:
                - opslensinstallations/status
              verbs:
                - get
                - update
                - patch
            - apiGroups:
                - ""
              resources:
                - configmaps
                - persistentvolumeclaims
                - services
                - serviceaccounts
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
            - apiGroups:
                - apps
              resources:
                - deployments
                - statefulsets
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - networking.k8s.io
              resources:
                - networkpolicies
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - route.openshift.io
              resources:
                - routes
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
            - apiGroups:
                - console.openshift.io
              resources:
                - consoleplugins
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ols.openshift.io
              resources:
                - olsconfigs
              verbs:
                - get
                - list
                - watch
                - update
                - patch
      deployments:
        - name: cywell-opslens-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: cywell-opslens
                app.kubernetes.io/component: operator
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: cywell-opslens
                  app.kubernetes.io/component: operator
              spec:
                serviceAccountName: cywell-opslens-operator
                containers:
                  - name: manager
                    image: quay.io/cywell/opslens-operator:0.1.0
                    imagePullPolicy: IfNotPresent
                    args:
                      - --leader-elect
                    env:
                      - name: WATCH_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                    ports:
                      - name: metrics
                        containerPort: 8080
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
