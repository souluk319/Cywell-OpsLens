apiVersion: v1
kind: Namespace
metadata:
  name: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: live-evidence-reader
    opslens.cywell.io/purpose: read-only-live-evidence
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cywell-opslens-live-evidence-reader
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: live-evidence-reader
    opslens.cywell.io/purpose: read-only-live-evidence
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cywell-opslens-live-evidence-reader
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: live-evidence-reader-rbac
    opslens.cywell.io/purpose: read-only-live-evidence
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - nodes
      - pods
      - pods/log
      - events
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
      - configmaps
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
      - cronjobs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - route.openshift.io
    resources:
      - routes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingresses
      - networkpolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - storage.k8s.io
    resources:
      - storageclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - image.openshift.io
    resources:
      - imagestreams
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - build.openshift.io
    resources:
      - builds
      - buildconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - console.openshift.io
    resources:
      - consoleplugins
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ols.openshift.io
    resources:
      - olsconfigs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - config.openshift.io
    resources:
      - clusterversions
      - clusteroperators
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheusrules
      - servicemonitors
      - podmonitors
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cywell-opslens-live-evidence-reader
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: live-evidence-reader-rbac
    opslens.cywell.io/purpose: read-only-live-evidence
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cywell-opslens-live-evidence-reader
subjects:
  - kind: ServiceAccount
    name: cywell-opslens-live-evidence-reader
    namespace: cywell-opslens
