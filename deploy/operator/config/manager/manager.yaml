apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-operator
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: cywell-opslens-operator
      containers:
        - name: manager
          image: quay.io/cywell/opslens-operator:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
