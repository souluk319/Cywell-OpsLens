apiVersion: v1
kind: Namespace
metadata:
  name: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cywell-opslens-api
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cywell-opslens-rag-policy
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: rag-policy
  annotations:
    opslens.cywell.io/document-intake: validate-only
    opslens.cywell.io/approval-queue: design-only
data:
  documentIntakeMode: validate-only
  evidenceExport: enabled
  rawDocumentReturnAllowed: "false"
  approvalQueueMode: design-only
  approvalQueueEnqueueAllowed: "false"
  requiredApprovals: rag-owner,cluster-sre
---
apiVersion: v1
kind: Secret
metadata:
  name: cywell-opslens-postgres-auth
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
type: Opaque
stringData:
  password: "<generated-by-operator>"
  url: "postgres://opslens:<generated-by-operator>@cywell-opslens-vector.cywell-opslens.svc.cluster.local:5432/opslens?sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-api
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: cywell-opslens-api
      containers:
        - name: api
          image: quay.io/cywell/opslens-api:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: KUGNUS_API_HOST
              value: "0.0.0.0"
            - name: KUGNUS_API_PORT
              value: "9443"
            - name: PORT
              value: "9443"
            - name: CYWELL_OPSLENS_TLS_CERT_FILE
              value: /var/run/secrets/cywell-opslens/tls/tls.crt
            - name: CYWELL_OPSLENS_TLS_KEY_FILE
              value: /var/run/secrets/cywell-opslens/tls/tls.key
            - name: CYWELL_OPSLENS_VECTOR_PROVIDER
              value: pgvector
            - name: CYWELL_OPSLENS_POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: cywell-opslens-postgres-auth
                  key: url
            - name: CYWELL_OPSLENS_MODEL_URL
              value: http://cywell-opslens-vllm:8000
            - name: CYWELL_OPSLENS_RAG_RUNTIME_MODE
              value: local
            - name: CYWELL_OPSLENS_ACTION_MODE
              value: plan-only
            - name: CYWELL_OPSLENS_RAG_DOCUMENT_INTAKE_MODE
              value: validate-only
            - name: CYWELL_OPSLENS_RAG_EVIDENCE_EXPORT
              value: enabled
            - name: CYWELL_OPSLENS_RAG_RAW_DOCUMENT_RETURN_ALLOWED
              value: "false"
            - name: CYWELL_OPSLENS_RAG_APPROVAL_QUEUE_MODE
              value: design-only
            - name: CYWELL_OPSLENS_RAG_APPROVAL_QUEUE_ENQUEUE_ALLOWED
              value: "false"
            - name: CYWELL_OPSLENS_RAG_REQUIRED_APPROVALS
              value: rag-owner,cluster-sre
          ports:
            - name: https
              containerPort: 9443
          volumeMounts:
            - name: service-serving-cert
              mountPath: /var/run/secrets/cywell-opslens/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: service-serving-cert
          secret:
            secretName: cywell-opslens-api-tls
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-api
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: cywell-opslens-api-tls
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
  ports:
    - name: https
      port: 443
      targetPort: https
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cywell-opslens-api-ingress
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-console
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-lightspeed
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cywell-opslens
      ports:
        - protocol: TCP
          port: 9443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-dashboard
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: quay.io/cywell/opslens-dashboard:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "9443"
            - name: CYWELL_OPSLENS_TLS_CERT_FILE
              value: /var/run/secrets/cywell-opslens/tls/tls.crt
            - name: CYWELL_OPSLENS_TLS_KEY_FILE
              value: /var/run/secrets/cywell-opslens/tls/tls.key
          ports:
            - name: https
              containerPort: 9443
          volumeMounts:
            - name: service-serving-cert
              mountPath: /var/run/secrets/cywell-opslens/tls
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: service-serving-cert
          secret:
            secretName: cywell-opslens-dashboard-tls
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-dashboard
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: cywell-opslens-dashboard-tls
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
  ports:
    - name: https
      port: 443
      targetPort: https
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: cywell-opslens-dashboard
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
  annotations:
    opslens.cywell.io/exposure: dashboard-demo-route
spec:
  to:
    kind: Service
    name: cywell-opslens-dashboard
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cywell-opslens-dashboard-ingress
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: dashboard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-console
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cywell-opslens
      ports:
        - protocol: TCP
          port: 9443
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cywell-opslens-vector
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
spec:
  serviceName: cywell-opslens-vector
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: vector-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: vector-store
    spec:
      containers:
        - name: pgvector
          image: docker.io/pgvector/pgvector:pg16
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: opslens
            - name: POSTGRES_USER
              value: opslens
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cywell-opslens-postgres-auth
                  key: password
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: vector-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: vector-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-vector
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-vllm
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: model-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: model-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: model-runtime
    spec:
      containers:
        - name: vllm
          image: quay.io/cywell/opslens-vllm:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - gemma-4-opslens
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-vllm
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: model-runtime
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: model-runtime
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: console-plugin
spec:
  displayName: Cywell OpsLens
  backend:
    type: Service
    service:
      name: cywell-opslens-dashboard
      namespace: cywell-opslens
      port: 443
      basePath: /
  proxy:
    - alias: opslens-api
      authorization: UserToken
      endpoint:
        type: Service
        service:
          name: cywell-opslens-api
          namespace: cywell-opslens
          port: 443
