apiVersion: v1
kind: Namespace
metadata:
  name: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cywell-opslens-api
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cywell-opslens-rag-policy
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: rag-policy
  annotations:
    opslens.cywell.io/document-intake: validate-only
    opslens.cywell.io/approval-queue: design-only
data:
  documentIntakeMode: validate-only
  evidenceExport: enabled
  rawDocumentReturnAllowed: "false"
  approvalQueueMode: design-only
  approvalQueueEnqueueAllowed: "false"
  requiredApprovals: rag-owner,cluster-sre
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-api
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: cywell-opslens-api
      containers:
        - name: api
          image: quay.io/cywell/opslens-api:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: CYWELL_OPSLENS_VECTOR_URL
              value: http://cywell-opslens-vector:6333
            - name: CYWELL_OPSLENS_MODEL_URL
              value: http://cywell-opslens-vllm:8000
            - name: CYWELL_OPSLENS_ACTION_MODE
              value: plan-only
            - name: CYWELL_OPSLENS_RAG_DOCUMENT_INTAKE_MODE
              value: validate-only
            - name: CYWELL_OPSLENS_RAG_EVIDENCE_EXPORT
              value: enabled
            - name: CYWELL_OPSLENS_RAG_RAW_DOCUMENT_RETURN_ALLOWED
              value: "false"
            - name: CYWELL_OPSLENS_RAG_APPROVAL_QUEUE_MODE
              value: design-only
            - name: CYWELL_OPSLENS_RAG_APPROVAL_QUEUE_ENQUEUE_ALLOWED
              value: "false"
            - name: CYWELL_OPSLENS_RAG_REQUIRED_APPROVALS
              value: rag-owner,cluster-sre
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-api
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: mcp
      port: 443
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-dashboard
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: quay.io/cywell/opslens-dashboard:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-dashboard
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cywell-opslens-vector
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
spec:
  serviceName: cywell-opslens-vector
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: vector-store
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: vector-store
    spec:
      containers:
        - name: qdrant
          image: docker.io/qdrant/qdrant:v1.12.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
          volumeMounts:
            - name: vector-data
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: vector-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-vector
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: vector-store
  ports:
    - name: http
      port: 6333
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opslens-vllm
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: model-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opslens
      app.kubernetes.io/component: model-runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opslens
        app.kubernetes.io/component: model-runtime
    spec:
      containers:
        - name: vllm
          image: quay.io/cywell/opslens-vllm:0.1.0
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - gemma-4-opslens
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: cywell-opslens-vllm
  namespace: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: model-runtime
spec:
  selector:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: model-runtime
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: cywell-opslens
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: console-plugin
spec:
  displayName: Cywell OpsLens
  service:
    name: cywell-opslens-dashboard
    namespace: cywell-opslens
    port: 80
    basePath: /
  proxy:
    - alias: opslens-api
      service:
        name: cywell-opslens-api
        namespace: cywell-opslens
        port: 80
      authorize: true
---
apiVersion: ols.openshift.io/v1alpha1
kind: OLSConfig
metadata:
  name: cluster
  namespace: openshift-lightspeed
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: lightspeed-registration
    app.kubernetes.io/managed-by: cywell-opslens-operator
  annotations:
    opslens.cywell.io/reconcile-mode: PatchOLSConfig
    opslens.cywell.io/rollback-path: restore the previous OLSConfig mcpServers entry from cluster backup or GitOps history
spec:
  featureGates:
    - MCPServer
  mcpServers:
    - name: cywell-opslens
      url: https://cywell-opslens-api.cywell-opslens.svc.cluster.local/mcp
      timeout: 30
      headers:
        - name: Authorization
          valueFrom:
            type: kubernetes
        - name: X-Cywell-Api-Key
          valueFrom:
            type: secret
            secretRef:
              name: cywell-opslens-mcp-header
