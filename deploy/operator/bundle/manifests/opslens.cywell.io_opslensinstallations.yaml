apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opslensinstallations.opslens.cywell.io
  labels:
    app.kubernetes.io/name: cywell-opslens
    app.kubernetes.io/component: operator-crd
spec:
  group: opslens.cywell.io
  scope: Namespaced
  names:
    plural: opslensinstallations
    singular: opslensinstallation
    kind: OpsLensInstallation
    shortNames:
      - oli
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Lightspeed
          type: string
          jsonPath: .status.lightspeedRegistration.phase
        - name: Version
          type: string
          jsonPath: .spec.version
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - version
                - components
                - lightspeedRegistration
              properties:
                version:
                  type: string
                  default: "0.1.0"
                targetNamespace:
                  type: string
                  default: cywell-opslens
                components:
                  type: object
                  required:
                    - api
                    - dashboard
                    - vectorStore
                    - modelRuntime
                  properties:
                    api:
                      type: object
                      required:
                        - image
                      properties:
                        image:
                          type: string
                        replicas:
                          type: integer
                          minimum: 1
                          default: 2
                        serviceName:
                          type: string
                          default: cywell-opslens-api
                        resources:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                    dashboard:
                      type: object
                      required:
                        - image
                      properties:
                        image:
                          type: string
                        replicas:
                          type: integer
                          minimum: 1
                          default: 1
                        serviceName:
                          type: string
                          default: cywell-opslens-dashboard
                    vectorStore:
                      type: object
                      required:
                        - provider
                        - storageSize
                      properties:
                        provider:
                          type: string
                          enum:
                            - qdrant
                            - pgvector
                            - inmemory
                          default: qdrant
                        image:
                          type: string
                          default: docker.io/qdrant/qdrant:v1.12.1
                        storageSize:
                          type: string
                          default: 20Gi
                    modelRuntime:
                      type: object
                      required:
                        - provider
                        - model
                      properties:
                        provider:
                          type: string
                          enum:
                            - vllm
                            - external
                            - mock-local
                          default: vllm
                        image:
                          type: string
                          default: quay.io/cywell/opslens-vllm:0.1.0
                        model:
                          type: string
                          default: gemma-4-opslens
                        replicas:
                          type: integer
                          minimum: 1
                          default: 1
                        gpu:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                              default: true
                            deviceClass:
                              type: string
                              default: nvidia.com/gpu
                            count:
                              type: integer
                              minimum: 0
                              default: 1
                rag:
                  type: object
                  description: RAG document intake policy. MVP 0.1 validates and exports evidence only; durable ingestion is disabled.
                  properties:
                    documentIntake:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - ValidateOnly
                          default: ValidateOnly
                        evidenceExport:
                          type: boolean
                          default: true
                        rawDocumentReturnAllowed:
                          type: boolean
                          default: false
                    approvalQueue:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - DesignOnly
                            - Disabled
                          default: DesignOnly
                        enqueueAllowed:
                          type: boolean
                          default: false
                        requiredApprovals:
                          type: array
                          items:
                            type: string
                          default:
                            - rag-owner
                            - cluster-sre
                lightspeedRegistration:
                  type: object
                  required:
                    - mode
                    - olsConfigName
                    - olsConfigNamespace
                    - mcpServerName
                  properties:
                    mode:
                      type: string
                      description: ValidateOnly checks the installed OLSConfig. PatchOLSConfig reconciles spec.featureGates and spec.mcpServers.
                      enum:
                        - ValidateOnly
                        - PatchOLSConfig
                      default: ValidateOnly
                    olsConfigName:
                      type: string
                      default: cluster
                    olsConfigNamespace:
                      type: string
                      default: openshift-lightspeed
                    mcpServerName:
                      type: string
                      default: cywell-opslens
                    apiKeySecretName:
                      type: string
                      default: cywell-opslens-mcp-header
                    userTokenForwarding:
                      type: boolean
                      default: true
                    endpoint:
                      type: string
                      default: https://cywell-opslens-api.cywell-opslens.svc.cluster.local/mcp
                consolePlugin:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    name:
                      type: string
                      default: cywell-opslens
              x-kubernetes-validations:
                - rule: "self.lightspeedRegistration.mode == 'ValidateOnly' || has(self.lightspeedRegistration.endpoint)"
                  message: PatchOLSConfig requires a Lightspeed MCP endpoint.
                - rule: "!has(self.rag) || !has(self.rag.documentIntake) || !has(self.rag.documentIntake.mode) || self.rag.documentIntake.mode == 'ValidateOnly'"
                  message: RAG document intake is validate-only in MVP 0.1.
                - rule: "!has(self.rag) || !has(self.rag.documentIntake) || !has(self.rag.documentIntake.rawDocumentReturnAllowed) || self.rag.documentIntake.rawDocumentReturnAllowed == false"
                  message: RAG raw document return is disabled in MVP 0.1.
                - rule: "!has(self.rag) || !has(self.rag.approvalQueue) || !has(self.rag.approvalQueue.enqueueAllowed) || self.rag.approvalQueue.enqueueAllowed == false"
                  message: RAG approval queue enqueue is disabled in MVP 0.1.
            status:
              type: object
              properties:
                phase:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                components:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      ready:
                        type: boolean
                      service:
                        type: string
                      image:
                        type: string
                lightspeedRegistration:
                  type: object
                  properties:
                    phase:
                      type: string
                    lastVerifiedAt:
                      type: string
                      format: date-time
                    evidence:
                      type: array
                      items:
                        type: string
                rag:
                  type: object
                  properties:
                    documentIntake:
                      type: object
                      properties:
                        mode:
                          type: string
                        evidenceExport:
                          type: string
                        rawDocumentReturnAllowed:
                          type: boolean
                    approvalQueue:
                      type: object
                      properties:
                        phase:
                          type: string
                        enqueueAllowed:
                          type: boolean
                        evidence:
                          type: array
                          items:
                            type: string
